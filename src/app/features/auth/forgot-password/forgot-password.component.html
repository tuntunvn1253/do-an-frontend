<div class="forgot-password-container">
  <div class="forgot-password-card">
    <h1 class="card-title">Quên Mật Khẩu</h1>

    <div *ngIf="!successMessage()">
      <p class="card-subtitle">
        Vui lòng nhập địa chỉ email bạn đã đăng ký. Chúng tôi sẽ gửi cho bạn một mã OTP để đặt lại mật khẩu.
      </p>
      <form (ngSubmit)="onSubmit()" class="forgot-password-form">
        <div *ngIf="errorMessage()" class="alert alert-danger">{{ errorMessage() }}</div>
        
        <div class="form-group">
          <label for="email">Email</label>
          <input 
            type="email" 
            id="email"
            name="email"
            [ngModel]="email()"
            (ngModelChange)="email.set($event)"
            [disabled]="loading()"
            required
            placeholder="email@example.com">
        </div>
        
        <button type="submit" class="submit-btn" [disabled]="loading()">
          {{ loading() ? 'ĐANG GỬI...' : 'GỬI LIÊN KẾT ĐẶT LẠI' }}
        </button>
      </form>
    </div>

    <div *ngIf="successMessage()" class="alert alert-success">
      {{ successMessage() }}
    </div>

    <div class="back-to-login">
      <a routerLink="/login">Quay lại trang Đăng nhập</a>
    </div>
  </div>
</div>
