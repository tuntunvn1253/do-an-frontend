<div class="reset-password-container">
  <div class="reset-password-card">
    <h1 class="card-title">Đặt Lại Mật Khẩu</h1>

    <div *ngIf="!successMessage()">
      <p class="card-subtitle">
        Vui lòng điền email, mã OTP bạn nhận được và mật khẩu mới.
      </p>
      <form (ngSubmit)="onSubmit()" class="reset-password-form">
        <div *ngIf="errorMessage()" class="alert alert-danger">{{ errorMessage() }}</div>
        
        <div class="form-group">
          <label for="email">Email</label>
          <input 
            type="email" 
            id="email"
            name="email"
            [ngModel]="email()"
            (ngModelChange)="email.set($event)"
            [disabled]="loading()"
            required
            placeholder="email@example.com">
        </div>

        <div class="form-group">
          <label for="otp">Mã OTP</label>
          <input 
            type="text" 
            id="otp"
            name="otp"
            [ngModel]="otp()"
            (ngModelChange)="otp.set($event)"
            [disabled]="loading()"
            required
            placeholder="Nhập mã OTP 6 chữ số">
        </div>

        <div class="form-group">
          <label for="password">Mật khẩu mới</label>
          <input 
            type="password" 
            id="password"
            name="password"
            [ngModel]="password()"
            (ngModelChange)="password.set($event)"
            [disabled]="loading()"
            required
            placeholder="Nhập mật khẩu mới">
        </div>
        
        <button type="submit" class="submit-btn" [disabled]="loading()">
          {{ loading() ? 'ĐANG XỬ LÝ...' : 'ĐẶT LẠI MẬT KHẨU' }}
        </button>
      </form>
    </div>

    <div *ngIf="successMessage()" class="alert alert-success">
      <p>{{ successMessage() }}</p>
      <p>Đang chuyển hướng đến trang đăng nhập...</p>
    </div>

    <div *ngIf="!successMessage()" class="back-to-login">
      <a routerLink="/login">Quay lại trang Đăng nhập</a>
    </div>
  </div>
</div>
